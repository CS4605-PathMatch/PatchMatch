<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMatch | User Testing Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colors sampled from your PathMatch header */
            --brand-purple: #7e00df;
            --brand-blue: #0070f3;
            --brand-green: #00c853;
            --bg-dark: #0a0a0c;
            --glass-white: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top left, #200040, #000 60%),
                        radial-gradient(circle at bottom right, #004020, #000);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 { 
    font-weight: 900;
    font-size: 3.5rem; 
    letter-spacing: -1.5px;
    margin-bottom: 40px; 
    text-align: center; /* This centers the title */
    background: linear-gradient(to right, var(--brand-purple), var(--brand-blue), var(--brand-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

        h2 { 
            font-weight: 700;
            color: #fff;
            margin-top: 0; 
            letter-spacing: -0.5px;
        }

        .section { 
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px; 
            margin-bottom: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            border-radius: 20px;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        iframe.prototype { 
            border: 2px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
            width: 100%; 
            background: #121212;
        }

        .btn-download { 
            display: inline-block;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-green));
            color: white; 
            padding: 18px 36px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            transition: all 0.3s ease;
            margin-top: 25px;
        }

        .btn-download:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 112, 243, 0.4);
        }

        img.flyer {
            width: 100%; 
            max-width: 500px; 
            border-radius: 15px; 
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        p { color: #a0a0a0; font-size: 1.1rem; font-weight: 300; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PathMatch</h1>

        <div class="section">
            <h2>Watch the Teaser</h2>
            <div class="video-container">
                <iframe src="https://youtu.be/yEiPZWh-uxk" allowfullscreen></iframe>
            </div>
        </div>

        <div class="section">
            <h2>Try the Prototype</h2>
            <p>Experience the PathMatch workflow firsthand.</p>
            <iframe class="prototype" height="650" src="https://petal-semi-00941037.figma.site/cyclist" allowfullscreen></iframe>
        </div>

        <div class="section">
            <h2>Become a Participant</h2>
            <p>We're looking for cyclists to help us refine the revenue and routing features.</p>
            <img src="ResearchParticipantRecruitmentFlyer.png" alt="Project Flyer" class="flyer">
            <br>
            <a href="ResearchParticipantRecruitmentFlyer.png" download class="btn-download">Download Flyer</a>
        </div>
    </div>

</body>
</html>
