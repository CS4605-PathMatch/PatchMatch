<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMatch | User Testing Portal</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-blue: #4facfe;
            --accent-purple: #96e6a1; /* Mint green transition */
            --glass-bg: rgba(255, 255, 255, 0.07);
            --text-color: #ffffff;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 800; 
            margin-bottom: 40px; 
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { color: #a18cd1; margin-top: 0; }

        .container { max-width: 900px; margin: 0 auto; }

        .section { 
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; 
            margin-bottom: 40px; 
            border-radius: 24px; 
            transition: transform 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .video-container iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        iframe.prototype { 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 16px; 
            width: 100%; 
            background: #1e1e1e;
        }

        .btn-download { 
            display: inline-block;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            color: white; 
            padding: 16px 32px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            margin-top: 20px;
        }

        .btn-download:hover { opacity: 0.9; box-shadow: 0 0 20px rgba(0, 219, 222, 0.5); }

        img.flyer {
            width: 100%; 
            max-width: 500px; 
            border-radius: 12px; 
            margin-top: 20px;
        }

        p { color: #ccc; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PathMatch Portal</h1>

        <div class="section">
            <h2>Watch the Teaser</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/xa5N1Af5u8M" allowfullscreen></iframe>
            </div>
        </div>

        <div class="section">
            <h2>Try the Prototype</h2>
            <p>Experience the future of campus cycling.</p>
            <iframe class="prototype" height="600" src="https://petal-semi-00941037.figma.site/cyclist" allowfullscreen></iframe>
        </div>

        <div class="section">
            <h2>Become a Participant</h2>
            <p>Help us build the perfect ride. Download our flyer to share with your group.</p>
            <img src="ResearchParticpantRecruitmentFlyer.png" alt="Project Flyer" class="flyer">
            <br>
            <a href="ResearchParticpantRecruitmentFlyer.png" download class="btn-download">Download Flyer</a>
        </div>
    </div>

</body>
</html>
